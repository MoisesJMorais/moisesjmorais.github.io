<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alekfull SNES Station - Mestre</title>
    <style>
        :root {
            --accent-color: #00e5ff;
            --bg-gradient: radial-gradient(circle, #2c3e50 0%, #000000 100%);
            --panel-bg: rgba(0, 0, 0, 0.75);
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--bg-gradient);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        #ui-layer { display: flex; flex-direction: column; height: 100vh; transition: opacity 0.5s; }

        /* Topo */
        .top-bar {
            display: flex; justify-content: space-between; padding: 10px 60px;
            background: rgba(0,0,0,0.5); border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        /* Área Central */
        .main-view {
            flex-grow: 1; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start; padding-top: 30px;
        }

        .snes-logo { width: 300px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.3)); }

        /* Carrossel */
        .carousel-container { 
            width: 100%; height: 300px; display: flex; 
            align-items: center; justify-content: center; position: relative;
        }

        .carousel { display: flex; gap: 30px; transition: transform 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); position: absolute; }

        .game-card {
            min-width: 190px; height: 260px; background-color: #111; border-radius: 10px;
            border: 4px solid transparent; transition: all 0.3s ease;
            background-size: cover; background-position: center; opacity: 0.4; transform: scale(0.85);
        }

        .game-card.active {
            opacity: 1; transform: scale(1.1); border-color: white;
            box-shadow: 0 0 35px var(--accent-color); z-index: 10;
        }

        /* Painel de Detalhes */
        .details-panel {
            width: 85%; max-width: 1050px; background: var(--panel-bg); 
            border-radius: 15px; padding: 25px; backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1);
            display: grid; grid-template-columns: 350px 1fr; gap: 30px; margin-top: 10px;
        }

        .screenshot {
            width: 100%; height: 200px; background: #000; 
            background-size: cover; background-position: center; 
            border-radius: 8px; border: 2px solid #444;
        }

        .info-text h2 { margin: 0 0 10px 0; font-size: 2rem; color: var(--accent-color); text-transform: uppercase; }
        .info-text p { margin: 0; font-size: 1.1rem; line-height: 1.5; color: #eee; }

        /* Rodapé com Botões e Status */
        .bottom-bar {
            height: 70px; background: rgba(0, 0, 0, 0.9);
            display: flex; justify-content: space-between; align-items: center; padding: 0 60px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .joy-status { display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #ff4444; box-shadow: 0 0 10px #ff4444; }
        .status-dot.online { background: #00ff00; box-shadow: 0 0 10px #00ff00; }

        .btn-hint { display: flex; gap: 20px; align-items: center; }
        .btn-icon { 
            background: #fff; color: #000; padding: 3px 12px; 
            border-radius: 20px; font-weight: 900; font-size: 0.85rem;
            box-shadow: 0 2px 5px rgba(0,0,0,0.5);
        }

        #emulator-container { display: none; width: 100vw; height: 100vh; background: black; position: absolute; top: 0; z-index: 100; }
    </style>
</head>
<body>

    <div id="ui-layer">
        <header class="top-bar">
            <span>SISTEMA DO MESTRE</span>
            <span id="clock">00:00</span>
        </header>

        <main class="main-view">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2c/SNES_logo.svg" class="snes-logo">
            
            <div class="carousel-container">
                <div class="carousel" id="carousel"></div>
            </div>

            <div class="details-panel">
                <div class="screenshot" id="game-screenshot"></div>
                <div class="info-text">
                    <h2 id="game-title">Título</h2>
                    <p id="game-desc">Descrição...</p>
                </div>
            </div>
        </main>

        <footer class="bottom-bar">
            <div class="joy-status">
                <div id="dot" class="status-dot"></div>
                <span id="joy-label">CONTROLE DESCONECTADO</span>
            </div>
            
            <div class="btn-hint">
                <div><span class="btn-icon">A / ✕</span> JOGAR</div>
                <div><span class="btn-icon">← →</span> NAVEGAR</div>
            </div>
        </footer>
    </div>

    <div id="emulator-container"><div id="game"></div></div>

    <script>
        const games = [
            { title: "Super Mario World", desc: "O clássico definitivo. Mario e Yoshi em busca da Princesa Peach.", rom: "roms/smw.sfc", cover: "https://upload.wikimedia.org/wikipedia/pt/0/06/Super_Mario_World_Capa.png", snap: "https://images.igdb.com/igdb/image/upload/t_720p/sc669p.jpg" },
            { title: "Donkey Kong Country", desc: "Uma aventura gráfica impressionante com a família Kong.", rom: "roms/dkc.sfc", cover: "https://upload.wikimedia.org/wikipedia/pt/b/b5/Donkey_Kong_Country_Capa.png", snap: "https://images.igdb.com/igdb/image/upload/t_720p/sc66a1.jpg" },
            { title: "Super Metroid", desc: "Samus Aran explora as profundezas do Planeta Zebes.", rom: "roms/metroid.sfc", cover: "https://upload.wikimedia.org/wikipedia/pt/e/e4/Capa_Super_Metroid.png", snap: "https://images.igdb.com/igdb/image/upload/t_720p/sc5x59.jpg" }
        ];

        let currentIndex = 0;
        let canMove = true;
        const carousel = document.getElementById('carousel');

        function init() {
            games.forEach((g, i) => {
                const card = document.createElement('div');
                card.className = `game-card ${i === 0 ? 'active' : ''}`;
                card.style.backgroundImage = `url('${g.cover}')`;
                carousel.appendChild(card);
            });
            updateUI();
            requestAnimationFrame(updateJoystick);
        }

        function updateUI() {
            const cards = document.querySelectorAll('.game-card');
            cards.forEach((c, i) => c.classList.toggle('active', i === currentIndex));
            
            const offset = (window.innerWidth / 2) - (110) - (currentIndex * 220);
            carousel.style.transform = `translateX(${offset}px)`;
            
            const g = games[currentIndex];
            document.getElementById('game-title').textContent = g.title;
            document.getElementById('game-desc').textContent = g.desc;
            document.getElementById('game-screenshot').style.backgroundImage = `url('${g.snap}')`;
        }

        // API DO JOYSTICK
        function updateJoystick() {
            const gamepads = navigator.getGamepads();
            const gp = gamepads[0];

            if (gp) {
                // Atualiza Visual do Status
                document.getElementById('dot').classList.add('online');
                document.getElementById('joy-label').textContent = "CONTROLE: " + gp.id.split('(')[0].substring(0, 15);

                const xRight = gp.axes[0] > 0.5 || gp.buttons[15].pressed;
                const xLeft = gp.axes[0] < -0.5 || gp.buttons[14].pressed;

                if (canMove) {
                    if (xRight && currentIndex < games.length - 1) {
                        currentIndex++; updateUI(); canMove = false;
                        setTimeout(() => canMove = true, 200);
                    } else if (xLeft && currentIndex > 0) {
                        currentIndex--; updateUI(); canMove = false;
                        setTimeout(() => canMove = true, 200);
                    }
                }
                if (gp.buttons[0].pressed) launchGame(games[currentIndex]);
            } else {
                document.getElementById('dot').classList.remove('online');
                document.getElementById('joy-label').textContent = "CONTROLE DESCONECTADO";
            }
            requestAnimationFrame(updateJoystick);
        }

        function launchGame(game) {
            document.getElementById('ui-layer').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('ui-layer').style.display = 'none';
                document.getElementById('emulator-container').style.display = 'block';
                window.EmuJS = { Core: "snes", Rom: game.rom, Place: "#game", format: "sfc" };
                const s = document.createElement("script");
                s.src = "https://cdn.jsdelivr.net/gh/ethanaobrien/emujs@latest/emu.js";
                document.body.appendChild(s);
            }, 500);
        }

        // Atalhos de teclado
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' && currentIndex < games.length - 1) { currentIndex++; updateUI(); }
            else if (e.key === 'ArrowLeft' && currentIndex > 0) { currentIndex--; updateUI(); }
            else if (e.key === 'Enter') launchGame(games[currentIndex]);
        });

        setInterval(() => {
            document.getElementById('clock').textContent = new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
        }, 1000);

        init();
    </script>
</body>
</html>
