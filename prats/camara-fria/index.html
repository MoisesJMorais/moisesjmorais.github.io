    <style>
        * {
            box-sizing: border-box;
            font-family: Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #1a1a1a;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
        }
        
        /* CONTENT GRID */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            margin-top: 55px;
        }

        @media (max-width: 768px) {
            .icon-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
            }

            .hide-on-mobile {
                display: none !important;
            }
        }

        .favorite-icon {
            background-color: #121212;
            border-radius: 12px;
            padding: 12px 4px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid #a0a0a0;
        }
        
        .favorite-icon:hover {
            background-color: #121212;
            border-color: #00e5ff;
        }

        .favorite-icon a {
            color: white;
            text-decoration: none;
            display: inline-block;
            width: 100%;
        }

        .favorite-icon img {
            width: 40px;
            height: 40px;
            margin-bottom: 6px;
            border-radius: 12px;
        }

        .favorite-icon span {
            display: block;
            font-size: 10px;
            font-weight: bold;
            word-break: break-word;
        }

    </style>
</head>

document.addEventListener("DOMContentLoaded", function() {
