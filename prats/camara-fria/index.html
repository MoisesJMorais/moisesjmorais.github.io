<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Ferramentas Câmara Fria</title>
    <link rel="icon" href="/prats/camara-fria/favicon.ico" type="image/png">
    <link rel="manifest" href="/prats/camara-fria/manifest.json">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Aquafina+Script&family=Poppins:wght@700&display=swap&subset=latin,latin-ext" rel="stylesheet">

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="/prats/security.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            font-family: Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 0;
        }

        body {
            background: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        /* HEADER */
        .header {
            padding: 24px 16px 12px;
            text-align: center;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .icon-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 16px;
}
        
        .header-title {
            font-family: 'Poppins', sans-serif;
            font-size: 22px;
            font-weight: 700;
            letter-spacing: 0.5px;
            color: #00e5ff;
        }

        .header-signature {
            font-size: 13px;
            color: #a0a0a0;
            font-weight: normal;
        }

        .header-signature span {
            font-family: 'Poppins', cursive !important;
            font-size: 13px;
            color: #a0a0a0; 
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3); 
            display: inline-block;
            margin-left: 6px;
            text-transform: none !important;
        }

        /* CONTENT GRID */
        .content {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
        }

        @media (max-width: 768px) {
            .icon-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
            }

            .hide-on-mobile {
                display: none !important;
            }
        }

        .favorite-icon {
            background-color: #1f1f1f;
            border-radius: 12px;
            padding: 12px 4px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .favorite-icon:hover {
            background-color: #2a2a2a;
        }

        .favorite-icon a {
            color: white;
            text-decoration: none;
            display: inline-block;
            width: 100%;
        }

        .favorite-icon img {
            width: 40px;
            height: 40px;
            margin-bottom: 6px;
            border-radius: 12px;
        }

        .favorite-icon span {
            display: block;
            font-size: 10px;
            font-weight: bold;
            word-break: break-word;
        }

    </style>
</head>
<body>

<div class="header">
    <h1 class="header-title">Ferramentas Câmara Fria</h1>
    <p class="header-signature">Desenvolvido por<span>Moisés J. Morais Lima</span></p>
</div>

<div class="content">
    <div class="icon-grid" id="iconGrid">
        <div class="favorite-icon">
            <a href="https://moisesjmorais.github.io/prats/camara-fria/leitor-qr-code.html" target="_self">
                <img src="https://moisesjmorais.github.io/prats/camara-fria/icons/qr-code-icon.png">
                <span>Ler QR-Code</span>
            </a>
        </div>
        <div class="favorite-icon">
            <a href="http://10.1.1.29/" target="_self">
                <img src="https://moisesjmorais.github.io/prats/img/SMDIA.png">
                <span>SMDIA</span>
            </a>
        </div>
        <div class="favorite-icon hide-on-mobile" id="atalho-restrito" style="display: none;">
            <a href="https://moisesjmorais.github.io/prats/gestao-de-reprocessos" target="_self">
                <img src="https://moisesjmorais.github.io/prats/gestao-de-reprocessos/favicon.ico">
                <span>Gestão de Reprocessos</span>
            </a>
        </div>
        <div class="favorite-icon">
            <a href="https://sucospratsservices.engeman.com:30289/" target="_self">
                <img src="https://moisesjmorais.github.io/prats/img/engeman.png">
                <span>Engeman</span>
            </a>
        </div>
        <div class="favorite-icon">
            <a href="https://moisesjmorais.github.io/prats/camara-fria/calculadora-picking.html" target="_self">
                <img src="https://moisesjmorais.github.io/prats/camara-fria/favicons/calculadora-picking.ico">
                <span>Calcular Picking</span>
            </a>
        </div>
        <div class="favorite-icon">
            <a href="https://moisesjmorais.github.io/prats/camara-fria/calculadora-producao.html" target="_self">
                <img src="https://moisesjmorais.github.io/prats/camara-fria/favicons/calculadora-producao.ico">
                <span>Calcular Produção</span>
            </a>
        </div>
        <div class="favorite-icon">
            <a href="https://moisesjmorais.github.io/prats/camara-fria/lote-nfc-2026.html" target="_self">
                <img src="https://moisesjmorais.github.io/prats/camara-fria/favicons/lote-nfc-2026.ico">
                <span>Lote de Hoje</span>
            </a>
        </div>
    </div>
</div>

<script>
    // Executa assim que a página carrega
document.addEventListener("DOMContentLoaded", function() {
    // Verifica se a chave secreta está salva no navegador e libera o atalho
    if (localStorage.getItem("atalho_chave") === "ativo") {
        document.getElementById("atalho-restrito").style.display = "block";
    }
});
</script>
</body>
</html>
