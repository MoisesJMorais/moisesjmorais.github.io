<!DOCTYPE html>
<html lang="pt-br">
<head>
    {% include default-config.html %}
    <link rel="icon" type="image/x-icon" href="https://moisesjmorais.github.io/prats/camara-fria/favicons/calculadora-producao.ico">
    
    <title>Calculadora de Produção</title>
    
    <style>
        :root {
            --bg: #1a1a1a;
            --calc-bg: #121212;
            --cyan: #00e5ff;
            --row: #212429;
            --text: #ffffff;
            --input-bg: #000000;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
	    	padding: 0 15px;
	    	box-sizing: border-box;
        }
        .calculator {
            width: 550px; /* Reduzido levemente já que tem menos colunas */
            background: var(--calc-bg);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #2d2f34;
        }
        .title-calculator {
            font-size: 0.9rem;
            text-align: center;
            color: var(--cyan);
            letter-spacing: 3px;
            margin: 0 0 20px 0;
            text-transform: uppercase;
            opacity: 0.8;
        }
        .labels {
            display: grid;
            grid-template-columns: 1.2fr 2fr 1.5fr; /* Ajustado para 3 colunas */
            gap: 10px;
            padding: 0 10px 8px 10px;
            font-size: 0.65rem;
            color: #666;
            text-transform: uppercase;
            font-weight: bold;
        }
        .sku-list { display: flex; flex-direction: column; gap: 6px; }
        .sku-row {
            background: var(--row);
            padding: 10px;
            border-radius: 8px;
            display: grid;
            grid-template-columns: 1.2fr 2fr 1.5fr; /* Ajustado para 3 colunas */
            gap: 10px;
            align-items: center;
            transition: background 0.2s;
        }
        .sku-row:hover { background: #2a2e35; }
        .sku-name { font-weight: bold; font-size: 0.9rem; }
        .sku-name span { display: block; font-size: 0.7rem; color: #888; font-weight: normal; }
        .inputs-group { display: flex; gap: 4px; }
        input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #3d4148;
            color: #fff;
            padding: 6px 2px;
            border-radius: 4px;
            text-align: center;
            font-size: 0.9rem;
        }
        input:focus { border-color: var(--cyan); outline: none; color: var(--cyan); }
        .row-total {
            font-family: 'Consolas', monospace;
            font-size: 1.3rem; /* Aumentado sutilmente para destaque */
            text-align: right;
        }
        .row-total.units { color: var(--cyan); font-weight: bold; }
        .display {
            background: #000;
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #222;
            display: flex;
            justify-content: center; /* Centralizado já que é apenas um bloco */
        }
        .display-box { text-align: center; }
        .display-label { display: block; font-size: 0.65rem; color: #666; margin-bottom: 4px; text-transform: uppercase; }
        .display-val { font-family: 'Courier New', monospace; font-size: 1.6rem; color: var(--cyan); font-weight: bold; }
		

        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; }
    </style>
</head>
	{% include title-fixed.html %}
<body>

<div class="calculator">
    <header>
        <h1 class="title-calculator">Calculadora de Produção</h1>
    </header>

    <div class="labels">
        <span>SKU</span>
        <span>Produção Armazenada</span>
        <span style="text-align: right;">Total Unidades</span>
    </div>

    <div class="sku-list" id="skuList"></div>

    <div class="display">
        <div class="display-box">
            <span class="display-label">Total Geral Unidades</span>
            <div class="display-val" id="grandUn">0</div>
        </div>
    </div>
</div>

<script>
    // Removido a propriedade 'l' (litros) dos objetos, mantendo apenas o fator de multiplicação
    const skus = [
        { n: "200 ML", f: 3960 },
        { n: "300 ML", f: 2880 },
        { n: "900 ML", f: 1224 },
        { n: "1,5 LT", f: 600 },
        { n: "3 LT", f: 280 },
        { n: "5 LT", f: 168 }
    ];

    const state = skus.map(() => ({ p: 0, u: 0 }));

    function render() {
    document.getElementById('skuList').innerHTML = skus.map((s, i) => `
        <div class="sku-row">
            <div class="sku-name">${s.n} <span>Pallet: ${s.f} un</span></div>
            <div class="inputs-group">
                <input type="number" placeholder="Pallets" 
                       oninput="if(this.value.length > 3) this.value = this.value.slice(0,3); upd(${i},'p',this.value)">
                
                <input type="number" placeholder="Picking" 
                       oninput="if(this.value.length > 4) this.value = this.value.slice(0,4); upd(${i},'u',this.value)">
            </div>
            <div class="row-total units" id="ru-${i}">0</div>
        </div>
    `).join('');
	}

    function upd(i, t, v) {
        state[i][t] = Number(v) || 0;
        const rowUn = (state[i].p * skus[i].f) + state[i].u;
        
        // Atualiza o total da linha
        document.getElementById(`ru-${i}`).innerText = rowUn.toLocaleString();

        // Calcula e atualiza o total geral
        let gUn = 0;
        state.forEach((val, idx) => {
            gUn += (val.p * skus[idx].f) + val.u;
        });

        document.getElementById('grandUn').innerText = gUn.toLocaleString();
    }

    render();
</script>
</body>
	{% include signature.html %}
</html>
