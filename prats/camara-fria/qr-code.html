<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/qr-code-icon.png">
    <title>Leitor de QR Code</title>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="https://moisesjmorais.github.io/security.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #121212;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            overflow: hidden;
        }

        .scanner-container {
            position: relative;
            width: 280px;
            height: 280px;
            border-radius: 24px;
            overflow: hidden;
            background-color: #000000;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
        }

        /* Container do vídeo da câmera */
        #reader {
            width: 100% !important;
            height: 100% !important;
            border: none !important;
        }

        /* Esconder elementos internos padrão da biblioteca que possam poluir o layout */
        #reader__dashboard, #reader__status_span {
            display: none !important;
        }
        
        video {
            object-fit: cover !important;
            width: 100% !important;
            height: 100% !important;
        }

        /* Máscara visual do scanner (Bordas e Linha de Scan) */
        .scanner-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 10;
            border: 4px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
        }

        /* Linha de escaneamento Azul Elétrico */
        .scan-line {
            position: absolute;
            top: 0;
            left: 5%;
            width: 90%;
            height: 4px;
            background: linear-gradient(90deg, transparent, #00E5FF, transparent);
            box-shadow: 0 0 12px #00E5FF, 0 0 25px #00E5FF;
            animation: scan 2.5s ease-in-out infinite;
        }

        @keyframes scan {
            0% { top: 5%; }
            50% { top: 90%; }
            100% { top: 5%; }
        }

        /* Descrição solicitada */
        .description {
            margin-top: 30px;
            font-size: 1rem;
            color: #A0A0A0;
            text-align: center;
            max-width: 250px;
            line-height: 1.5;
            font-weight: 500;
        }

        /* Área de resultado */
        #result {
            margin-top: 20px;
            padding: 15px;
            background-color: #1E1E1E;
            border-radius: 12px;
            max-width: 90%;
            word-break: break-all;
            text-align: center;
            display: none;
            border: 1px solid #333;
        }
        
        #result a {
            color: #00E5FF;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <div class="scanner-container">
        <div id="reader"></div>
        <div class="scanner-overlay">
            <div class="scan-line"></div>
        </div>
    </div>

    <p class="description">Aponte sua câmera para escanear o QR-Code.</p>

    <div id="result"></div>

    <script>
        function onScanSuccess(decodedText, decodedResult) {
            // Para o escaneamento após o sucesso (opcional)
            html5QrcodeScanner.clear();
            
            const resultContainer = document.getElementById('result');
            resultContainer.style.display = 'block';
            
            // Verifica se o resultado é um link
            if (decodedText.startsWith('http://') || decodedText.startsWith('https://')) {
                resultContainer.innerHTML = `<strong>Resultado:</strong> <br><a href="${decodedText}" target="_blank">${decodedText}</a>`;
            } else {
                resultContainer.innerHTML = `<strong>Resultado:</strong> <br>${decodedText}`;
            }
        }

        function onScanFailure(error) {
            // Erros de leitura contínuos são comuns enquanto a câmera busca o código, 
            // por isso deixamos vazio para não travar a experiência do usuário.
        }

        // Configuração do leitor otimizado para o smartphone
        const html5QrcodeScanner = new Html5Qrcode("reader");
        
        // Prioriza a câmera traseira (environment) e define o tamanho da área de leitura
        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            {
                fps: 24,
                qrbox: { width: 250, height: 250 }
            },
            onScanSuccess,
            onScanFailure
        ).catch((err) => {
            console.error("Erro ao iniciar a câmera: ", err);
            document.querySelector('.description').innerText = "Erro ao acessar a câmera. Certifique-se de dar as permissões necessárias.";
        });
    </script>
</body>
</html>
