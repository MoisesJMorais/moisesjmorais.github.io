<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow">
    
    <title>Ferramentas Câmara Fria</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500&display=swap" rel="stylesheet">
    <link rel="icon" href="https://moisesjmorais.github.io/prats/favicon.ico" type="image/x-icon">
    <script src="https://moisesjmorais.github.io/security.js"></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0f1210; /* Tom exato de preto/verde-escuro do fundo */
            font-family: 'Roboto', sans-serif;
            color: #e2e3e1; /* Cor clara do texto */
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 40px 16px;
        }

        .container {
            width: 100%;
            max-width: 480px; /* Ajustado ligeiramente para comportar as 4 colunas */
        }

        h1 {
            font-size: 32px;
            font-weight: 500;
            margin-bottom: 36px;
            letter-spacing: 0.5px;
            padding-left: 8px;
        }

        .apps-grid {
            display: grid;
            /* Configurado estritamente para 4 colunas de tamanhos iguais */
            grid-template-columns: repeat(4, 1fr);
            column-gap: 12px;
            row-gap: 24px;
            justify-items: center;
        }

        .app-item {
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            cursor: pointer;
            transition: transform 0.1s ease;
        }

        .app-item:active {
            transform: scale(0.95); /* Efeito sutil de clique/toque */
        }

        .icon-wrapper {
            width: 60px; /* Ajustado para caber perfeitamente em 4 colunas */
            height: 60px;
            border-radius: 16px; /* Mantém o corte arredondado perfeito nos cantos da imagem */
            overflow: hidden; /* Garante que a imagem respeite as bordas arredondadas */
            margin-bottom: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #1a1f1b; /* Fundo reserva caso a imagem falhe ao carregar */
        }

        .icon-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Faz a imagem preencher o quadrado sem distorcer */
        }

        .app-label {
            font-size: 13px; /* Reduzido levemente para melhor legibilidade em 4 colunas */
            text-align: center;
            line-height: 1.3;
            word-break: break-word;
            max-width: 76px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Apps Suco Prat's</h1>
        
        <div class="apps-grid">
            
            <a href="http://10.1.1.29" target="_self" class="app-item">
                <div class="icon-wrapper">
                    <img src="https://moisesjmorais.github.io/prats/img/SMDIA.png" alt="SMDIA">
                </div>
                <span class="app-label">SMDIA</span>
            </a>

            <a href="https://sucospratsservices.engeman.com:30289" target="_self" class="app-item">
                <div class="icon-wrapper">
                    <img src="https://moisesjmorais.github.io/prats/img/engeman.png" alt="Engeman">
                </div>
                <span class="app-label">Engeman</span>
            </a>

            <a href="https://app.livemes.com" target="_self" class="app-item">
                <div class="icon-wrapper">
                    <img src="https://moisesjmorais.github.io/prats/img/livemes.jpg" alt="LiveMes">
                </div>
                <span class="app-label">LiveMes</span>
            </a>

            <a href="https://moisesjmorais.github.io/prats/lote-nfc" target="_self" class="app-item">
                <div class="icon-wrapper">
                    <img src="https://moisesjmorais.github.io/prats/lote-nfc/favicon.ico" alt="Lote do Dia">
                </div>
                <span class="app-label">Lote do Dia</span>
            </a>

            <a href="https://moisesjmorais.github.io/prats/calculadora-picking" target="_self" class="app-item">
                <div class="icon-wrapper">
                    <img src="https://moisesjmorais.github.io/prats/calculadora-picking/favicon.ico" alt="Calculadora de Picking">
                </div>
                <span class="app-label">Calcular<br>Picking</span>
            </a>

            <a href="https://moisesjmorais.github.io/prats/calculadora-producao" target="_self" class="app-item">
                <div class="icon-wrapper">
                    <img src="https://moisesjmorais.github.io/prats/calculadora-producao/favicon.ico" alt="Calculadora de Produção">
                </div>
                <span class="app-label">Calcular<br>Produção</span>
            </a>

        </div>
    </div>

</body>
</html>
