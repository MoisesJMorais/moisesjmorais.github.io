<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#000000">
    <title>Materiais de Estudo</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/2232/2232688.png">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2232/2232688.png">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #080808;
            --accent-color: #d1d1d1;
            --card-bg: #1a1a1a;
            --border-color: #333;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: white;
            padding-top: 110px;
            padding-bottom: 50px;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background-color: rgba(8, 8, 8, 0.98);
            padding: 15px;
            z-index: 1000;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        h1 {
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 12px;
            color: var(--accent-color);
        }

        .search-bar {
            width: 100%;
            height: 44px;
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: 4px;
            color: white;
            padding: 0 15px;
            font-size: 16px;
            outline: none;
        }

        .search-bar:focus {
            border-color: var(--accent-color);
        }

        .categoria-section {
            border-bottom: 1px solid #222;
        }

        .categoria-header {
            width: 100%;
            padding: 15px 20px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            border: none;
            color: var(--accent-color);
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .categoria-header::after {
            content: '+';
            font-size: 1.2rem;
        }

        .categoria-header.active::after {
            content: '-';
        }

        .categoria-content {
            display: none;
            padding: 15px;
        }

        .vitrine {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .book-link {
            display: block;
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            border: 1px solid #333;
            aspect-ratio: 1 / 1.4142;
            background-color: #1a1a1a;
            transition: transform 0.1s;
        }

        .book-link:active {
            transform: scale(0.95);
        }

        .book-link img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .fallback-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #555;
            font-size: 10px;
            text-align: center;
            z-index: -1;
        }

        /* Classe para esconder livros que não batem com a busca */
        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>

    <header>
        <h1>Materiais de Estudo</h1>
        <input type="text" id="searchInput" class="search-bar" placeholder="Procurar livro ou apostila...">
    </header>

    <main id="mainContent">
        <div class="categoria-section">
            <button class="categoria-header">Técnico em Informática</button>
            <div class="categoria-content">
                <div class="vitrine">
                    <a href="https://redeetec.mec.gov.br/images/stories/pdf/eixo_infor_comun/tec_inf/081112_anal_sist.pdf" class="book-link">
                        <span class="fallback-text">Análise de Sistemas</span>
                        <img src="https://moisesjmorais.github.io/estudos/capas/analise-de-sistemas-tec-info-etec.png" alt="Análise de Sistemas">
                    </a>
                    <a href="https://redeetec.mec.gov.br/images/stories/pdf/eixo_infor_comun/tec_inf/081112_empreend.pdf" class="book-link">
                        <span class="fallback-text">Empreendedorismo</span>
                        <img src="https://moisesjmorais.github.io/estudos/capas/empreendedorismo-tec-info-etec.png" alt="Empreendedorismo">
                    </a>
                    <a href="https://redeetec.mec.gov.br/images/stories/pdf/eixo_infor_comun/tec_inf/081112_etica_leg.pdf" class="book-link">
                        <span class="fallback-text">Ética e Legislação</span>
                        <img src="https://moisesjmorais.github.io/estudos/capas/etica-e-legislacao-tec-info-etec.png" alt="Análise de Sistemas">
                    </a>
                    <a href="https://redeetec.mec.gov.br/images/stories/pdf/eixo_infor_comun/tec_inf/081112_fund_desenv.pdf" class="book-link">
                        <span class="fallback-text">Fundamentos do Desenvolvimento WEB</span>
                        <img src="https://moisesjmorais.github.io/estudos/capas/fundamentos-do-desenvolvimento-web-tec-info-etec.png" alt="Análise de Sistemas">
                    </a>
                    <a href="https://redeetec.mec.gov.br/images/stories/pdf/eixo_infor_comun/tec_inf/081112_progr_obj.pdf" class="book-link">
                        <span class="fallback-text">Programação Orientada a Objetos</span>
                        <img src="https://moisesjmorais.github.io/estudos/capas/programacao-orientada-a-objetos-tec-info-etec.png" alt="Análise de Sistemas">
                    </a>
                    <a href="https://redeetec.mec.gov.br/images/stories/pdf/eixo_infor_comun/tec_inf/081112_progr_web.pdf" class="book-link">
                        <span class="fallback-text">Programação para WEB</span>
                        <img src="https://moisesjmorais.github.io/estudos/capas/programacao-para-web-tec-info-etec.png" alt="Análise de Sistemas">
                    </a>
                    <a href="https://redeetec.mec.gov.br/images/stories/pdf/eixo_infor_comun/tec_inf/081112_protserv_redes.pdf" class="book-link">
                        <span class="fallback-text">Protocolos e Serviços de Redes</span>
                        <img src="https://moisesjmorais.github.io/estudos/capas/protocolos-e-servicos-de-redes-tec-info-etec.png" alt="Análise de Sistemas">
                    </a>
                    <a href="https://redeetec.mec.gov.br/images/stories/pdf/eixo_infor_comun/tec_inf/081112_rede_comp.pdf" class="book-link">
                        <span class="fallback-text">Redes de Computadores</span>
                        <img src="https://moisesjmorais.github.io/estudos/capas/redes-de-computadores-tec-info-etec.png" alt="Análise de Sistemas">
                    </a>
                    <a href="https://redeetec.mec.gov.br/images/stories/pdf/eixo_infor_comun/tec_inf/081112_tecn_prg.pdf" class="book-link">
                        <span class="fallback-text">Técnicas de Programação</span>
                        <img src="https://moisesjmorais.github.io/estudos/capas/tecnicas-de-programacao-tec-info-etec.png" alt="Análise de Sistemas">
                    </a>
                    <a href="https://redeetec.mec.gov.br/images/stories/pdf/eixo_infor_comun/tec_inf/081112_org_arq_comp.pdf" class="book-link">
                        <span class="fallback-text">Organização e Arquitetura de Computadores</span>
                        <img src="https://moisesjmorais.github.io/estudos/capas/organizacao-e-arquitetura-de-computadores-tec-info-etec.png" alt="Análise de Sistemas">
                    </a>
                </div>
            </div>
        </div>

    </main>

    <script>
        // 1. Lógica do Accordion (Abrir/Fechar Categorias)
        const headers = document.querySelectorAll('.categoria-header');
        
        headers.forEach(header => {
            header.addEventListener('click', function() {
                toggleCategory(this);
            });
        });

        function toggleCategory(header, forceOpen = false) {
            const content = header.nextElementSibling;
            if (forceOpen) {
                header.classList.add('active');
                content.style.display = "block";
            } else {
                header.classList.toggle('active');
                content.style.display = (content.style.display === "block") ? "none" : "block";
            }
        }

        // 2. Lógica de Busca em Tempo Real
        const searchInput = document.getElementById('searchInput');
        const books = document.querySelectorAll('.book-link');

        searchInput.addEventListener('input', function() {
            const searchTerm = this.value.toLowerCase();

            headers.forEach(header => {
                const section = header.parentElement;
                const sectionBooks = section.querySelectorAll('.book-link');
                let hasVisibleBook = false;

                sectionBooks.forEach(book => {
                    const title = book.querySelector('img').getAttribute('alt').toLowerCase();
                    
                    if (title.includes(searchTerm)) {
                        book.classList.remove('hidden');
                        hasVisibleBook = true;
                    } else {
                        book.classList.add('hidden');
                    }
                });

                // Se estiver buscando algo, abre as categorias que têm resultados
                if (searchTerm.length > 0) {
                    if (hasVisibleBook) {
                        section.classList.remove('hidden');
                        toggleCategory(header, true); // Força abertura
                    } else {
                        section.classList.add('hidden');
                    }
                } else {
                    // Se a busca estiver vazia, mostra todas as categorias e as fecha
                    section.classList.remove('hidden');
                    const content = header.nextElementSibling;
                    header.classList.remove('active');
                    content.style.display = "none";
                }
            });
        });
    </script>

</body>
</html>
