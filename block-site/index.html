<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Site Bloqueado</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

    body {
      margin: 0;
      padding: 0;
      font-family: 'Roboto', sans-serif;
      background-color: #f4f6f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: #1f2937;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.15);
      text-align: center;
      max-width: 480px;
      width: 90%;
    }

    .logo {
      width: 80px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #ef4444;
    }

    p {
      font-size: 16px;
      margin-bottom: 20px;
      color: #374151;
    }

    .footer {
      font-size: 12px;
      color: #9ca3af;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Logo AdGuard -->
    <img class="logo" src="https://cdn.adguard.com/public/Adguard/adguard_logo_icon.svg" alt="AdGuard Logo">
    <h1>🚫 Site Bloqueado</h1>
    <p>O acesso a este conteúdo foi restrito pelo AdGuard.</p>
    <p>Se você está vendo uma mensagem de bloqueio é porque o site que você tentou carregar viola políticas de segurança. (Jogos de azar, Malwares, Sites Adultos, Drogas, Fraudes, etc...)</p>
    <div class="footer">© AdGuard</div>
  </div>
</body>
</html>
