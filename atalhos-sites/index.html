<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="noindex, nofollow">

<title>Apps Leves</title>
<link rel="icon" href="https://www.google.com/chrome/static/images/favicons/favicon-32x32.png" type="image/png">
<link rel="manifest" href="https://moisesjmorais.github.io/atalhos-sites/manifest.json">
 
<script src="security.js"></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('/atalhos-web/sw.js', { scope: '/' })
        .then((reg) => {
          console.log('SW registrado com sucesso!');
          
          if (reg.waiting) {
            reg.waiting.postMessage({ type: 'SKIP_WAITING' });
          }
        });
    });

    let refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (!refreshing) {
        refreshing = true;
        window.location.reload();
      }
    });
  }
</script>

<style>
* {
    box-sizing: border-box;
    font-family: Roboto, system-ui, sans-serif;
    margin: 0;
    padding: 0;
    -webkit-touch-callout: none;
    -webkit-user-select: none;
    user-select: none;
}

body {
    background: #121212;
    color: #ffffff;
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
}

/* HEADER OTIMIZADO - MODIFICADO PARA COMPORTAR O H1 ALINHADO */
.header {
    padding: 16px 20px 8px;
    display: flex;
    justify-content: space-between; /* Espalha o título para a esquerda e botões para a direita */
    align-items: center; /* Alinha verticalmente o texto com os botões */
    flex-shrink: 0;
}

/* ESTILIZAÇÃO DO TÍTULO H1 */
.header h1 {
    font-size: 20px;
    font-weight: 500;
    color: #ffffff;
}

.manage-buttons {
    display: flex;
    gap: 10px;
}

.btn-manage {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: #aaa;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    width: 36px;
    height: 36px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.btn-manage:hover {
    color: #fff;
    background-color: rgba(255, 255, 255, 0.12);
    border-color: rgba(255, 255, 255, 0.2);
}

.btn-manage.active {
    color: #ff4d4d;
    background-color: rgba(255, 77, 77, 0.15);
    border-color: rgba(255, 77, 77, 0.4);
    box-shadow: 0 0 10px rgba(255, 77, 77, 0.2);
}

/* CONTENT GRID */
.content {
    flex: 1;
    overflow-y: auto;
    padding: 12px 16px;
    position: relative;
}

.icon-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
}

.favorite-icon {
    position: relative;
    background-color: #1f1f1f;
    border-radius: 12px;
    padding: 12px 4px;
    text-align: center;
    transition: background 0.2s, transform 0.1s, opacity 0.2s;
    touch-action: none;
}

 .favorite-icon:hover {
    border-color: #00e5ff; /* Borda neon quando passa o mouse */
    background-color: #252525; /* Opcional: um leve destaque no fundo ao passar o mouse */
}

.favorite-icon.dragging-mobile {
    position: fixed;
    z-index: 9999;
    pointer-events: none;
    opacity: 0.8;
    box-shadow: 0 10px 20px rgba(0,0,0,0.5);
    transform: scale(1.1);
    background-color: #333333;
}

.favorite-icon.placeholder-mobile {
    opacity: 0.3;
    background-color: #121212;
    border: 2px dashed #444;
}

.favorite-icon a {
    color: white;
    text-decoration: none;
    display: inline-block;
    width: 100%;
    pointer-events: none;
}

.favorite-icon img {
    width: 40px;
    height: 40px;
    margin-bottom: 6px;
    border-radius: 12px;
}

.favorite-icon span {
    display: block;
    font-size: 10px;
    font-weight: bold;
    word-break: break-word;
}

.remove-btn {
    position: absolute;
    top: -4px;
    right: -4px;
    background: #ff4d4d;
    color: white;
    border: none;
    border-radius: 50%;
    width: 20px;
    height: 20px;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    line-height: 1;
    z-index: 10;
    box-shadow: 0 2px 5px rgba(0,0,0,0.3);
}

.remove-mode .remove-btn {
    display: flex;
}

.remove-mode .favorite-icon {
    animation: shake 0.3s infinite alternate;
}

@keyframes shake {
    0% { transform: rotate(-0.5deg); }
    100% { transform: rotate(0.5deg); }
}

/* Add Modal */
#add-modal-container {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 999;
}

.modal-content {
    width: 300px;
    background: #1f1f1f;
    border: 1px solid #333;
    padding: 20px;
    border-radius: 8px;
}

.modal-content h3 {
    margin-bottom: 16px;
    font-size: 16px;
    text-align: center;
}

.modal-content input {
    width: 100%;
    padding: 8px 12px;
    margin-bottom: 12px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 6px;
    color: white;
    outline: none;
    -webkit-user-select: text;
    user-select: text;
}

.modal-buttons {
    display: flex;
    justify-content: space-between;
    gap: 8px;
}

.modal-buttons button {
    flex: 1;
    padding: 8px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
}

.btn-cancel {
    background: #444;
    color: white;
}

.btn-save {
    background: #0f9d58;
    color: white;
}

.modal-close {
    position: absolute;
    top: 20px;
    right: 20px;
    font-size: 26px;
    color: #fff;
    cursor: pointer;
}
</style>
</head>
<body>

<div class="header">
    <h1>Apps Leves</h1>
    <div class="manage-buttons">
        <button class="btn-manage" onclick="openAddModal()" title="Adicionar">+</button>
        <button class="btn-manage" id="btnToggleRemove" onclick="toggleRemoveMode()" title="Remover">−</button>
    </div>
</div>

<div class="content" id="contentArea">
    <div class="icon-grid" id="iconGrid"></div>
</div>

<div id="add-modal-container">
    <div class="modal-close" onclick="closeAddModal()">✕</div>
    <div class="modal-content">
        <h3>Adicionar Atalho</h3>
        <input type="text" id="newTitle" placeholder="Nome do aplicativo">
        <input type="text" id="newUrl" placeholder="URL (https://...)">
        <input type="text" id="newIcon" placeholder="URL do Ícone (Opcional)">
        <div class="modal-buttons">
            <button class="btn-cancel" onclick="closeAddModal()">Cancelar</button>
            <button class="btn-save" onclick="saveShortcut()">Salvar</button>
        </div>
    </div>
</div>

<script>
let isRemoveMode = false;

// Variáveis de Controle do Touch Mobile
let touchStartTimer = null;
let activeDragElement = null;
let dragPlaceholder = null;
let initialShortcutIndex = null;
let currentShortcutIndex = null;
let offsetX = 0;
let offsetY = 0;

const defaultShortcuts = [
    { name: "Gemini", url: "https://gemini.google.com/", icon: "https://www.google.com/s2/favicons?domain=gemini.google.com&sz=64" },
    { name: "ChatGPT", url: "https://chatgpt.com", icon: "https://moisesjmorais.github.io/atalhos-web/Icons/ChatGPT.png" },
    { name: "Baixar do Instagram", url: "https://sssinstagram.com/pt", icon: "https://moisesjmorais.github.io/atalhos-web/Icons/SSSInstagram.png" },
    { name: "AVA", url: "https://www.eadunifatecie.com.br/login/index.php", icon: "https://moisesjmorais.github.io/atalhos-web/Icons/UniFatecie.jpg" },
    { name: "Portal do Aluno", url: "https://portaldoaluno.fatecie.edu.br/", icon: "https://moisesjmorais.github.io/atalhos-web/Icons/UniFatecie.jpg" },
    { name: "AlunoNet", url: "https://waeweb.unifatecie.edu.br/servlet/hwalgn?1", icon: "https://moisesjmorais.github.io/atalhos-web/Icons/UniFatecie.jpg" },
    { name: "FACUMINAS EAD", url: "https://ead.eduno.com.br/login", icon: "https://moisesjmorais.github.io/atalhos-web/Icons/Facuminas.jpeg" },
    { name: "IFRS Cursos Gratuitos", url: "https://moodle.ifrs.edu.br", icon: "https://moisesjmorais.github.io/atalhos-web/Icons/IF-Logo.png" },
    { name: "Materiais de Estudo", url: "https://drive.google.com/drive/folders/1KXNl_8oZG4un2biQp8fr8EjmFV6tVeTB", icon: "https://moisesjmorais.github.io/atalhos-web/Icons/GoogleDrive.png" },
    { name: "Mercado Livre", url: "https://mercadolivre.com.br", icon: "https://play-lh.googleusercontent.com/iVaeA0HDw8CZjEM-K7GdLB9XYmpcwVFSuv4Q8o9uh4Br7PuKCm3QSYCVU73tr9BBXdR_7xTX4yO0azOJegRVcA=w240-h480-rw" },
    { name: "Casas Bahia", url: "https://casasbahia.com.br", icon: "https://play-lh.googleusercontent.com/mK8nSaHKW-RyJu0m-ykYiSoWXxj3LdnDmHRMxkPPTtl_X9LYrs4Tz7M5srd6AxtuOBk2vDJVRZo42tGIKG1cmiY" },
    { name: "Saiko Pastel", url: "https://saiko.comandax.com.br", icon: "https://moisesjmorais.github.io/atalhos-web/Icons/Saiko-Pastel-Delivery.png" }
];

let shortcuts = JSON.parse(localStorage.getItem('myShortcuts')) || defaultShortcuts;

function renderShortcuts() {
    const grid = document.getElementById('iconGrid');
    grid.innerHTML = '';

    if (isRemoveMode) {
        grid.classList.add('remove-mode');
    } else {
        grid.classList.remove('remove-mode');
    }

    shortcuts.forEach((shortcut, index) => {
        const div = document.createElement('div');
        div.className = 'favorite-icon';
        div.setAttribute('data-index', index);
        
        const iconSrc = shortcut.icon || `https://www.google.com/s2/favicons?domain=${new URL(shortcut.url).hostname}&sz=64`;

        div.innerHTML = `
            <button class="remove-btn" onclick="removeShortcut(event, ${index})" title="Remover">×</button>
            <a href="#">
                <img src="${iconSrc}" alt="${shortcut.name}" onerror="this.src='https://www.google.com/s2/favicons?domain=${shortcut.url}&sz=64'">
                <span>${shortcut.name}</span>
            </a>
        `;

        // ---- LÓGICA DE EVENTOS MOBILE SMARTPHONE ----
        div.addEventListener('touchstart', (e) => {
            if (isRemoveMode) return;
            
            const touch = e.touches[0];
            const rect = div.getBoundingClientRect();
            
            initialShortcutIndex = index;
            currentShortcutIndex = index;
            
            offsetX = touch.clientX - rect.left;
            offsetY = touch.clientY - rect.top;

            touchStartTimer = setTimeout(() => {
                if (navigator.vibrate) navigator.vibrate(50);
                
                activeDragElement = div.cloneNode(true);
                activeDragElement.classList.add('dragging-mobile');
                activeDragElement.style.width = `${rect.width}px`;
                activeDragElement.style.height = `${rect.height}px`;
                activeDragElement.style.left = `${touch.clientX - offsetX}px`;
                activeDragElement.style.top = `${touch.clientY - offsetY}px`;
                document.body.appendChild(activeDragElement);

                dragPlaceholder = div;
                dragPlaceholder.classList.add('placeholder-mobile');
            }, 200);
        }, { passive: true });

        div.addEventListener('touchmove', (e) => {
            if (!activeDragElement) {
                clearTimeout(touchStartTimer);
                return;
            }
            e.preventDefault();

            const touch = e.touches[0];
            activeDragElement.style.left = `${touch.clientX - offsetX}px`;
            activeDragElement.style.top = `${touch.clientY - offsetY}px`;

            const targetElement = document.elementFromPoint(touch.clientX, touch.clientY);
            const targetIcon = targetElement ? targetElement.closest('.favorite-icon') : null;

            if (targetIcon && targetIcon !== dragPlaceholder) {
                const targetIndex = parseInt(targetIcon.getAttribute('data-index'));
                if (!isNaN(targetIndex) && targetIndex !== currentShortcutIndex) {
                    const movedItem = shortcuts.splice(currentShortcutIndex, 1)[0];
                    shortcuts.splice(targetIndex, 0, movedItem);
                    currentShortcutIndex = targetIndex;
                    
                    renderShortcutsSilently(currentShortcutIndex);
                }
            }
        }, { passive: false });

        div.addEventListener('touchend', (e) => {
            clearTimeout(touchStartTimer);
            
            // CORREÇÃO AQUI: Se estiver no modo de exclusão, ignora o clique de abrir o site inteiramente
            if (isRemoveMode) return; 

            if (activeDragElement) {
                activeDragElement.remove();
                activeDragElement = null;
                
                if (dragPlaceholder) {
                    dragPlaceholder.classList.remove('placeholder-mobile');
                    dragPlaceholder = null;
                }

                localStorage.setItem('myShortcuts', JSON.stringify(shortcuts));
                renderShortcuts();
            } else {
                window.location.href = shortcut.url;
            }
        });

        grid.appendChild(div);
    });
}

function renderShortcutsSilently(placeholderIdx) {
    renderShortcuts();
    const grid = document.getElementById('iconGrid');
    const items = grid.querySelectorAll('.favorite-icon');
    if(items[placeholderIdx]) {
        dragPlaceholder = items[placeholderIdx];
        dragPlaceholder.classList.add('placeholder-mobile');
    }
}

function toggleRemoveMode() {
    isRemoveMode = !isRemoveMode;
    const btn = document.getElementById('btnToggleRemove');

    if (isRemoveMode) {
        btn.classList.add('active');
        btn.innerText = '✕'; // Ícone discreto para fechar/desativar a remoção
    } else {
        btn.classList.remove('active');
        btn.innerText = '−';
    }
    renderShortcuts();
}

function openAddModal() {
    if (isRemoveMode) toggleRemoveMode();
    document.getElementById('add-modal-container').style.display = 'flex';
}

function closeAddModal() {
    document.getElementById('add-modal-container').style.display = 'none';
    document.getElementById('newTitle').value = '';
    document.getElementById('newUrl').value = '';
    document.getElementById('newIcon').value = '';
}

function saveShortcut() {
    const name = document.getElementById('newTitle').value.trim();
    let url = document.getElementById('newUrl').value.trim();
    const icon = document.getElementById('newIcon').value.trim();

    if (!name || !url) {
        alert("Por favor, preencha o nome e a URL.");
        return;
    }

    if (!/^https?:\/\//i.test(url)) {
        url = 'https://' + url;
    }

    shortcuts.push({ name, url, icon });
    localStorage.setItem('myShortcuts', JSON.stringify(shortcuts));
    renderShortcuts();
    closeAddModal();
}

function removeShortcut(event, index) {
    // Para travar o clique tanto no Mobile quanto Desktop
    event.stopPropagation();
    event.preventDefault();
    
    if (confirm(`Deseja realmente remover o atalho "${shortcuts[index].name}"?`)) {
        shortcuts.splice(index, 1);
        localStorage.setItem('myShortcuts', JSON.stringify(shortcuts));
        renderShortcuts();
    }
}

// Inicialização
renderShortcuts();
</script>

</body>
</html>
