<style>
  
  body {
    margin: 0;
  }

  .title-fixed-h1-camara-fria {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    margin: 0;
    padding: 10px 0;
    font-family: 'Poppins', sans-serif;
    font-size: 1.3rem;
    font-weight: 700;
    text-align: center;
    text-transform: none;
    color: #a0a0a0;
    background-color: #000000;
    z-index: 1000;
  }

  .title-fixed-h1-camara-fria::after {
    content: "";
    position: absolute;
    top: 100%; /* Cola na base do header e desce */
    left: 0;
    width: 100%;

    /* Vai do preto puro ao transparente */
    background: linear-gradient(to bottom, #000000, rgba(0, 0, 0, 0));
    pointer-events: none;
  }
  
</style>
